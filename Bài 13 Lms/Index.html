<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Registration Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h2>REGISTRATION</h2>
  <hr>
  <form id="registerForm"> 
    <div class="form-group">
      <label>Username:</label>
      <input type="text" id="username">
    </div>
    <div class="form-group">
      <label>Password:</label>
      <input type="password" id="password">
    </div>
    <div class="form-group">
      <label>Re-type Password:</label>
      <input type="password" id="repassword">
    </div>
    <hr>
    <div class="form-group">
      <label>Birthday:</label>
      <select id="month">
        <option>[select one]</option>
        <option>January</option>
        <option>February</option>
        <option>March</option>
      </select>
      <input type="number" placeholder="Day" id="day">
      <input type="number" placeholder="Year" id="year">
      <span>(Month Day, Year)</span>
    </div>
    <div class="form-group">
      <label>Images:</label>
      <input type="file">
    </div>
    <hr>
    <div class="form-group name-group">
      <div>
        <label>First Name:</label>
        <input type="text">
      </div>
      <div>
        <label>Last Name:</label>
        <input type="text">
      </div>
    </div>
    <hr>
    <div class="form-group">
      <label>Interests (optional):</label>
      <div class="checkbox-group">
        <div>
          <input type="checkbox"> Entertainment<br>
          <input type="checkbox"> Home & Family<br>
          <input type="checkbox"> Health<br>
          <input type="checkbox"> Music
        </div>
        <div>
          <input type="checkbox"> Business<br>
          <input type="checkbox"> Computers & Technology<br>
          <input type="checkbox"> Personal Finance<br>
          <input type="checkbox"> Small Business
        </div>
      </div>
    </div>
    <button type="submit">REGISTER</button>
  </form>
</div>
<script src="main.js"></script>
</body>
</html>
